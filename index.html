<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Search - Visual 2.0</title>
    <style>
        :root {
            --primary-color: #4285f4;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* Giả lập khung hình Camera */
        .camera-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1000&auto=format&fit=crop') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* Hiệu ứng quét (Scanning Beam) */
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, var(--primary-color), transparent);
            box-shadow: 0 0 15px var(--primary-color);
            top: 0;
            animation: scan 3s infinite linear;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* Các điểm chạm thông minh (Smart Hotspots) */
        .hotspot {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(66, 133, 244, 0.7); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(66, 133, 244, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(66, 133, 244, 0); }
        }

        /* Header thanh tìm kiếm */
        .search-header {
            width: 90%;
            margin-top: 20px;
            padding: 15px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Nút chụp hình dưới cùng */
        .controls {
            margin-bottom: 40px;
            text-align: center;
        }

        .shutter-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            border: 5px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: 0.3s;
        }

        .shutter-btn:active {
            transform: scale(0.9);
            background: var(--primary-color);
        }

        .mode-selector {
            margin-top: 15px;
            color: white;
            display: flex;
            gap: 20px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .active-mode { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); }
    </style>
</head>
<body>

<div class="camera-container">
    <div class="scanner-line"></div>

    <div class="search-header">
        <span style="margin-left: 10px;">🔍 Đang phân tích vật thể...</span>
    </div>

    <!-- Giả lập các điểm AI nhận diện được -->
    <div class="hotspot" style="top: 40%; left: 50%;" title="Đồng hồ thông minh"></div>
    <div class="hotspot" style="top: 70%; left: 30%;" title="Bàn làm việc"></div>

    <div class="controls">
        <button class="shutter-btn"></button>
        <div class="mode-selector">
            <span>DỊCH</span>
            <span class="active-mode">TÌM KIẾM</span>
            <span>MUA SẮM</span>
        </div>
    </div>
</div>

<script>
    // Xử lý click vào điểm hotspot
    document.querySelectorAll('.hotspot').forEach(item => {
        item.addEventListener('click', () => {
            alert('AI đang tìm kiếm thông tin về: ' + item.title);
        });
    });
</script>

</body>
</html>
