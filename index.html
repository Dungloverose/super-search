<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XD Super App</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .left-panel { width: 40%; border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .right-panel { width: 60%; padding: 20px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--accent); background: var(--card); color: white; margin-bottom: 25px; outline: none; font-size: 16px; box-sizing: border-box; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .app-btn { background: var(--card); border: 1px solid #475569; padding: 18px 10px; border-radius: 12px; text-align: center; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .app-btn:hover { background: #2d3748; border-color: var(--accent); }
        .cam-sec { display: flex; gap: 12px; align-items: center; }
        .cam-btn { background: var(--card); padding: 12px 18px; border-radius: 10px; border: 1px solid var(--accent); cursor: pointer; }
        .cam-label { flex: 1; background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        .ai-sec { background: linear-gradient(135deg, #6366f1, #38bdf8); color: white; padding: 25px; border-radius: 15px; font-weight: bold; text-align: center; font-size: 24px; cursor: pointer; border: none; }
        .bottom-sec { display: flex; gap: 20px; flex: 1; }
        .music-box { flex: 1; background: var(--card); border-radius: 15px; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; cursor: pointer; color: #94a3b8; }
        .fav-box { flex: 1; background: var(--card); border-radius: 15px; border: 1px solid #334155; padding: 15px; }
    </style>
</head>
<body>

    <div class="left-panel">
        <input type="text" id="q" class="search-box" placeholder="Nhập nội dung...">
        <div class="app-grid">
            <div class="app-btn" onclick="openLink('yt')">YouTube</div>
            <div class="app-btn" onclick="openLink('tk')">TikTok</div>
            <div class="app-btn" onclick="openLink('fb')">Facebook</div>
            <div class="app-btn" onclick="openLink('sp')">Shopee</div>
            <div class="app-btn" onclick="openLink('gg')">Google</div>
            <div class="app-btn" onclick="openLink('mp')">Maps</div>
        </div>
    </div>

    <div class="right-panel">
        <div class="cam-sec">
            <div class="cam-btn">📷</div>
            <div class="cam-label">Chụp Ảnh</div>
        </div>
        <button class="ai-sec" onclick="openLink('ai')">AI GEMINI</button>
        <div class="bottom-sec">
            <div class="music-box" onclick="openLink('sf')">NHẠC</div>
            <div class="fav-box">
                <h4 style="margin:0">TAB yêu thích</h4>
                <p style="font-size:12px; color:#64748b">• Danh sách trống</p>
            </div>
        </div>
    </div>

    <script>
        function openLink(key) {
            const val = document.getElementById('q').value;
            if (!val && key !== 'sf' && key !== 'ai') {
                alert("Bạn chưa nhập nội dung tìm kiếm!");
                return;
            }

            const query = encodeURIComponent(val);
            const links = {
                yt: 'https://www.youtube.com/results?search_query=',
                tk: 'https://www.tiktok.com/search?q=',
                fb: 'https://www.facebook.com/search/top/?q=',
                sp: 'https://shopee.vn/search?keyword=',
                gg: 'https://www.google.com/search?q=',
                mp: 'https://www.google.com/maps/search/',
                sf: 'https://open.spotify.com/search/',
                ai: 'https://gemini.google.com/'
            };

            let finalUrl = links[key];
            if (key !== 'ai' && key !== 'sf' || (key === 'sf' && val)) {
                finalUrl += query;
            }

            // MẸO: Sử dụng thẻ <a> ẩn để "đánh lừa" trình đóng gói App mở trình duyệt ngoài
            const a = document.createElement('a');
            a.href = finalUrl;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.click();
        }
    </script>
</body>
</html>
