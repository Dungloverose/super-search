<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XD Super App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { 
            font-family: sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* CỘT TRÁI: TÌM KIẾM & APPS */
        .left-panel { 
            width: 40%; border-right: 1px solid #334155; 
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .search-box { width: 100%; padding: 12px; border-radius: 20px; border: 2px solid var(--accent); background: var(--card); color: white; margin-bottom: 20px; outline: none; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .app-btn { background: var(--card); border: 1px solid #334155; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; }
        .app-btn:active { transform: scale(0.95); }

        /* CỘT PHẢI: AI, NHẠC, CHỤP ẢNH */
        .right-panel { width: 60%; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Khu vực Chụp ảnh */
        .camera-sec { display: flex; gap: 10px; align-items: center; }
        .cam-btn { background: var(--card); padding: 10px; border-radius: 10px; cursor: pointer; border: 1px solid var(--accent); }
        .cam-label { flex: 1; background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid #334155; }

        /* Khu vực AI Gemini */
        .ai-sec { background: linear-gradient(90deg, #38bdf8, #818cf8); color: white; padding: 15px; border-radius: 10px; font-weight: bold; text-align: center; font-size: 20px; cursor: pointer; }

        /* Khu vực Nhạc & Tab yêu thích */
        .bottom-sec { display: flex; gap: 15px; flex: 1; }
        .music-box { flex: 1; background: var(--card); border-radius: 15px; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .fav-box { flex: 1; background: var(--card); border-radius: 15px; border: 1px solid #334155; padding: 15px; }
    </style>
</head>
<body>

    <!-- BÊN TRÁI -->
    <div class="left-panel">
        <input type="text" id="q" class="search-box" placeholder="TÌM KIẾM...">
        <div class="app-grid">
            <div class="app-btn" onclick="go('yt')">YouTube</div>
            <div class="app-btn" onclick="go('fb')">Facebook</div>
            <div class="app-btn" onclick="go('tk')">TikTok</div>
            <div class="app-btn" onclick="go('sp')">Shopee</div>
            <div class="app-btn" onclick="go('gg')">Google</div>
            <div class="app-btn" onclick="go('mp')">Maps</div>
        </div>
    </div>

    <!-- BÊN PHẢI -->
    <div class="right-panel">
        <div class="camera-sec">
            <div class="cam-btn" onclick="alert('Mở Camera...')">📷</div>
            <div class="cam-label">Chụp Ảnh</div>
        </div>

        <div class="ai-sec" onclick="window.open('https://gemini.google.com/', '_blank')">
            AI GEMINI
        </div>

        <div class="bottom-sec">
            <div class="music-box" onclick="go('sf')">NHẠC</div>
            <div class="fav-box">
                <h4 style="margin:0 0 10px 0">TAB yêu thích</h4>
                <p style="font-size: 12px; color: #94a3b8;">• Chỉnh sửa danh sách...</p>
            </div>
        </div>
    </div>

    <script>
        function go(app) {
            const val = document.getElementById('q').value;
            const encoded = encodeURIComponent(val);
            
            const urls = {
                yt: { w: 'https://youtube.com/results?search_query=', a: 'youtube://results?search_query=' },
                fb: { w: 'https://facebook.com/search/top/?q=', a: 'fb://search/?q=' },
                tk: { w: 'https://tiktok.com/search?q=', a: 'snssdk1128://search?keyword=' },
                sp: { w: 'https://shopee.vn/search?keyword=', a: 'shopeevn://search?keyword=' },
                gg: { w: 'https://google.com/search?q=', a: 'googlechrome://' },
                mp: { w: 'https://google.com/maps/search/', a: 'comgooglemaps://?q=' },
                sf: { w: 'https://open.spotify.com/search/', a: 'spotify:search:' }
            };

            if (!val && app !== 'sf') return alert("Nhập nội dung tìm kiếm!");

            const start = Date.now();
            // Thử mở App thật
            window.location.href = urls[app].a + encoded;

            // Nếu không có App thì mở Web sau 0.5 giây
            setTimeout(() => {
                if (Date.now() - start < 800) {
                    window.open(urls[app].w + encoded, '_blank');
                }
            }, 500);
        }
    </script>
</body>
</html>
